<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTD3</title>

    <!-- Correct Ruffle (IMPORTANT) -->
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

    <style>
        html, body {
            margin: 0;
            height: 100%;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #game {
            width: 800px;
            height: 600px;
        }
    </style>
</head>

<body>

<div id="game"></div>

<script>
window.addEventListener("load", () => {

    // Correct modern Ruffle way (FIXES YOUR ERROR)
    const ruffle = window.RufflePlayer?.newest?.() || window.RufflePlayer;
    const player = ruffle.createPlayer();

    player.style.width = "100%";
    player.style.height = "100%";

    document.getElementById("game").appendChild(player);

    // Load your SWF
    player.load("game.swf").catch(console.error);
});
</script>

</body>
</html>
