<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bloons Tower Defense 3</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black;
}

/* Fullscreen container */
#container {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    background: black;
}

/* Ruffle player fills screen */
ruffle-player, canvas {
    width: 100% !important;
    height: 100% !important;
    display: block;
}

/* prevent scroll/selection issues */
body {
    user-select: none;
}
</style>
</head>

<body>

<div id="container"></div>

<!-- IMPORTANT: use ONLY this file from your Ruffle build -->
<script src="ruffle.js"></script>

<script>
window.addEventListener("DOMContentLoaded", async () => {
    const container = document.getElementById("container");

    // Create Ruffle player correctly
    const ruffle = window.RufflePlayer?.newest ? window.RufflePlayer.newest() : window.RufflePlayer;
    const player = ruffle.createPlayer();

    player.style.width = "100%";
    player.style.height = "100%";

    container.appendChild(player);

    // Load SWF
    try {
        await player.load("game.swf");
    } catch (e) {
        console.error("SWF failed to load:", e);
    }
});
</script>

</body>
</html>
