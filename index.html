<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bloons Tower Defense 3</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black;
}

/* FULL SCREEN CONTAINER */
#container {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
}

/* Ruffle player fills everything */
ruffle-player {
    width: 100% !important;
    height: 100% !important;
    display: block;
}

/* Canvas must stretch fully */
canvas {
    width: 100% !important;
    height: 100% !important;
    display: block;
}
</style>
</head>

<body>

<div id="container"></div>

<!-- IMPORTANT: correct local path -->
<script src="./ruffle.js"></script>

<script>
window.addEventListener("load", async () => {
    // Ruffle init (new safe method)
    const ruffle = window.RufflePlayer?.newest?.() || window.RufflePlayer?.createPlayer?.().constructor;

    if (!window.RufflePlayer) {
        console.error("Ruffle failed to load");
        return;
    }

    const player = window.RufflePlayer.newest().createPlayer();

    player.style.width = "100%";
    player.style.height = "100%";

    document.getElementById("container").appendChild(player);

    try {
        await player.load("./game.swf");
        console.log("Game loaded");
    } catch (e) {
        console.error("SWF load failed:", e);
    }
});
</script>

</body>
</html>
