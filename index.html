<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloons Tower Defense 3</title>

    <!-- Ruffle (Flash emulator) -->
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

    <style>
        /* FULLSCREEN EMBED STYLE */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: black;
        }

        /* Game fills entire screen */
        #game {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }

        /* Make sure canvas fills container */
        ruffle-player, canvas {
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>

<body>

<div id="game"></div>

<script>
window.addEventListener("load", () => {

    // Create Ruffle player
    const ruffle = window.RufflePlayer.newest();
    const player = ruffle.createPlayer();

    // Attach to page
    const container = document.getElementById("game");
    container.appendChild(player);

    // Fullscreen sizing
    player.style.width = "100%";
    player.style.height = "100%";

    // Load your SWF
    player.load("game.swf").catch(err => {
        console.error("Failed to load SWF:", err);
    });

});
</script>

</body>
</html>
