<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BTD3</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  overflow: hidden;

  /* center the game */
  display: flex;
  justify-content: center;
  align-items: center;
}

/* THIS is the key: fixed aspect ratio container */
#game-wrapper {
  width: 100vw;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* force 4:3 box */
#game-stage {
  aspect-ratio: 4 / 3;
  height: 100vh;
  max-width: calc(100vh * 4 / 3);
}

/* ruffle fills ONLY the stage */
#game-stage ruffle-player,
#game-stage canvas {
  width: 100% !important;
  height: 100% !important;
  display: block;
}
</style>
</head>

<body>

<div id="game-wrapper">
  <div id="game-stage"></div>
</div>

<script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

<script>
window.addEventListener("load", () => {
    const ruffle = window.RufflePlayer.newest();
    const player = ruffle.createPlayer();

    document.getElementById("game-stage").appendChild(player);

    player.load("game.swf");
});
</script>

</body>
</html>
