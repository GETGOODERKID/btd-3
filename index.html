<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BTD3</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: black;
}

#container {
  position: fixed;
  inset: 0;
  display: flex;
}

/* force canvas fullscreen */
#container ruffle-player,
#container canvas {
  width: 100% !important;
  height: 100% !important;
  display: block;
}
</style>
</head>

<body>

<div id="container"></div>

<!-- use your local ruffle -->
<script src="ruffle.js"></script>

<script>
window.addEventListener("load", () => {
    const ruffle = window.RufflePlayer?.newest?.();
    if (!ruffle) {
        console.error("Ruffle failed to load");
        return;
    }

    const player = ruffle.createPlayer();

    document.getElementById("container").appendChild(player);

    // FULLSCREEN FIX
    player.style.width = "100%";
    player.style.height = "100%";

    // load game
    player.load("game.swf");
});
</script>

</body>
</html>
